<template>
    <lightning-card title="Engagement Summary" icon-name="standard:opportunity">
        <div class="slds-p-around_medium">
            <template if:true={hasSummary}>
                <p>
                    <strong>Opportunity Amount:</strong>
                    <lightning-formatted-number value={summary.amount}
                        format-style="currency"></lightning-formatted-number>
                </p>
                <p><strong>Completed Tasks:</strong> {summary.taskCount}</p>
                <p><strong>Upcoming Events:</strong> {summary.eventCount}</p>

                <div class="slds-m-top_medium">
                    <lightning-button label="Quick Follow-Up Call" variant="brand" onclick={handleFollowUp}
                        disabled={disableFollowUp}></lightning-button>
                </div>
            </template>

            <template if:true={errorMessage}>
                <p class="slds-text-color_error">{errorMessage}</p>
            </template>
        </div>
    </lightning-card>
</template>
